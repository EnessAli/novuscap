services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: novuscap-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - novuscap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ASPNETCORE_ENVIRONMENT=Development
    container_name: novuscap-backend
    env_file:
      - .env
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novuscap-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_URL
        - REACT_APP_GOOGLE_MAPS_API_KEY
        - REACT_APP_ENVIRONMENT
    container_name: novuscap-frontend
    env_file:
      - .env
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - novuscap-network
    restart: unless-stopped

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    container_name: novuscap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - novuscap-network
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  novuscap-network:
    driver: bridge